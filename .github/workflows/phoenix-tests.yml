name: Phoenix Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phoenix
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest test_recsys_model.py test_recsys_retrieval_model.py -v
